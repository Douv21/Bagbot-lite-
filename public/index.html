<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAG Bot - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 BAG Bot</h1>
                <p>Dashboard</p>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-page="welcome-depart">
                    <span>👋</span> Bienvenue/Depart
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Bienvenue/Depart</h1>
            </header>

            <div class="content">
                <!-- Welcome Section -->
                <div class="section">
                    <h2>👋 Bienvenue</h2>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="welcomeEnabled" checked>
                            Activer les messages de bienvenue
                        </label>
                    </div>
                    <div class="form-group">
                        <label>Message de bienvenue</label>
                        <textarea id="welcomeMessage" rows="3">Bienvenue {user} !</textarea>
                        <small>Variables: {user}, {server}</small>
                    </div>
                    <div class="form-group">
                        <label>Salon de bienvenue</label>
                        <input type="text" id="welcomeChannel" placeholder="ID du salon">
                    </div>
                </div>

                <!-- Depart Section -->
                <div class="section">
                    <h2>👋 Départ</h2>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="departEnabled" checked>
                            Activer les messages de départ
                        </label>
                    </div>
                    <div class="form-group">
                        <label>Message de départ</label>
                        <textarea id="departMessage" rows="3">Au revoir {user} !</textarea>
                        <small>Variables: {user}, {server}</small>
                    </div>
                    <div class="form-group">
                        <label>Salon de départ</label>
                        <input type="text" id="departChannel" placeholder="ID du salon">
                    </div>
                </div>

                <!-- Save Button -->
                <div class="actions">
                    <button class="btn btn-primary" id="saveBtn">💾 Sauvegarder</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
