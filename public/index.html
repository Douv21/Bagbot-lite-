<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAG Bot - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>BAG Bot</h1>
                <p>Dashboard</p>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-page="welcome-depart">
                    <span>👋</span> Bienvenue/Depart
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Bienvenue/Depart</h1>
            </header>

            <div class="content">
                <!-- Tabs -->
                <div class="tabs">
                    <div class="tab active" data-tab="welcome">Bienvenue</div>
                    <div class="tab" data-tab="depart">Départ</div>
                </div>

                <!-- Welcome Tab Content -->
                <div class="tab-content active" id="tab-welcome">
                    <div class="section">
                        <h2>Configuration Bienvenue</h2>
                        
                        <!-- Embed Preview -->
                        <div class="embed-preview" id="welcomeEmbedPreview" style="border-left-color: #C41E3A;" onclick="openImageModal('welcome')">
                            <div class="embed-author" id="welcomeEmbedAuthor" style="display: none;">
                                <img src="" alt="Author" id="welcomeEmbedAuthorIcon">
                                <div class="embed-author-name" id="welcomeEmbedAuthorName"></div>
                            </div>
                            <div class="embed-title" id="welcomeEmbedTitle">👋 Bienvenue</div>
                            <div class="embed-description" id="welcomeEmbedDescription">Bienvenue {user} sur le serveur !</div>
                            <div class="embed-fields" id="welcomeEmbedFields" style="display: none;"></div>
                            <div class="embed-thumbnail" id="welcomeEmbedThumbnail" style="display: none;">
                                <img src="" alt="Thumbnail">
                            </div>
                            <img class="embed-image" id="welcomeEmbedImage" src="" alt="" style="display: none;">
                            <div class="embed-footer" id="welcomeEmbedFooter" style="display: none;">
                                <span id="welcomeEmbedFooterText"></span>
                                <span id="welcomeEmbedFooterIcon"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="welcomeEnabled" checked>
                                Activer les messages de bienvenue
                            </label>
                        </div>
                        <div class="form-group">
                            <label>Salon de bienvenue</label>
                            <select id="welcomeChannel">
                                <option value="">Sélectionner un salon...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Couleur de l'embed</label>
                            <input type="color" id="welcomeColor" value="#C41E3A" oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Titre de l'embed</label>
                            <input type="text" id="welcomeTitle" value="👋 Bienvenue" oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Message de bienvenue</label>
                            <textarea id="welcomeMessage" rows="4" oninput="updateWelcomeEmbed()">Bienvenue {user} sur le serveur !</textarea>
                            <small>Variables: {user}, {server}, {member_count}</small>
                        </div>
                        <div class="form-group">
                            <label>Author Name</label>
                            <input type="text" id="welcomeAuthorName" placeholder="Nom de l'auteur" oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Author Icon URL</label>
                            <input type="text" id="welcomeAuthorIcon" placeholder="https://..." oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Thumbnail URL</label>
                            <input type="text" id="welcomeThumbnail" placeholder="https://..." oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="welcomeImage" placeholder="https://..." oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Footer Text</label>
                            <input type="text" id="welcomeFooterText" placeholder="Texte du footer" oninput="updateWelcomeEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Footer Icon URL</label>
                            <input type="text" id="welcomeFooterIcon" placeholder="https://..." oninput="updateWelcomeEmbed()">
                        </div>
                    </div>
                </div>

                <!-- Depart Tab Content -->
                <div class="tab-content" id="tab-depart">
                    <div class="section">
                        <h2>Configuration Départ</h2>
                        
                        <!-- Embed Preview -->
                        <div class="embed-preview" id="departEmbedPreview" style="border-left-color: #C41E3A;" onclick="openImageModal('depart')">
                            <div class="embed-author" id="departEmbedAuthor" style="display: none;">
                                <img src="" alt="Author" id="departEmbedAuthorIcon">
                                <div class="embed-author-name" id="departEmbedAuthorName"></div>
                            </div>
                            <div class="embed-title" id="departEmbedTitle">👋 Au revoir</div>
                            <div class="embed-description" id="departEmbedDescription">Au revoir {user} !</div>
                            <div class="embed-fields" id="departEmbedFields" style="display: none;"></div>
                            <div class="embed-thumbnail" id="departEmbedThumbnail" style="display: none;">
                                <img src="" alt="Thumbnail">
                            </div>
                            <img class="embed-image" id="departEmbedImage" src="" alt="" style="display: none;">
                            <div class="embed-footer" id="departEmbedFooter" style="display: none;">
                                <span id="departEmbedFooterText"></span>
                                <span id="departEmbedFooterIcon"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="departEnabled" checked>
                                Activer les messages de départ
                            </label>
                        </div>
                        <div class="form-group">
                            <label>Salon de départ</label>
                            <select id="departChannel">
                                <option value="">Sélectionner un salon...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Couleur de l'embed</label>
                            <input type="color" id="departColor" value="#C41E3A" oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Titre de l'embed</label>
                            <input type="text" id="departTitle" value="👋 Au revoir" oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Message de départ</label>
                            <textarea id="departMessage" rows="4" oninput="updateDepartEmbed()">Au revoir {user} !</textarea>
                            <small>Variables: {user}, {server}</small>
                        </div>
                        <div class="form-group">
                            <label>Author Name</label>
                            <input type="text" id="departAuthorName" placeholder="Nom de l'auteur" oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Author Icon URL</label>
                            <input type="text" id="departAuthorIcon" placeholder="https://..." oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Thumbnail URL</label>
                            <input type="text" id="departThumbnail" placeholder="https://..." oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="departImage" placeholder="https://..." oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Footer Text</label>
                            <input type="text" id="departFooterText" placeholder="Texte du footer" oninput="updateDepartEmbed()">
                        </div>
                        <div class="form-group">
                            <label>Footer Icon URL</label>
                            <input type="text" id="departFooterIcon" placeholder="https://..." oninput="updateDepartEmbed()">
                        </div>
                    </div>
                </div>

                <!-- Save Button -->
                <div class="actions">
                    <button class="btn btn-primary" id="saveBtn">💾 Sauvegarder</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Modifier les images</h2>
                <button class="modal-close" onclick="closeImageModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Thumbnail URL</label>
                    <input type="text" id="modalThumbnail" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="modalImage" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Author Icon URL</label>
                    <input type="text" id="modalAuthorIcon" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Footer Icon URL</label>
                    <input type="text" id="modalFooterIcon" placeholder="https://...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveImageModal()">Appliquer</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
