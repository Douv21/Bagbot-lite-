<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAG Bot - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>👑 Bagbot Elite</h1>
                <p>Dashboard</p>
            </div>
            <div class="login-content">
                <h2>Connexion requise</h2>
                <p>Connectez-vous avec votre compte Discord pour accéder au dashboard.</p>
                <p class="admin-note">⚠️ Vous devez être administrateur d'un serveur où le bot est présent.</p>
                <a href="/auth/login" class="btn btn-primary btn-large">
                    <span>🔐</span> Connexion avec Discord
                </a>
            </div>
        </div>
    </div>
</body>
</html>
